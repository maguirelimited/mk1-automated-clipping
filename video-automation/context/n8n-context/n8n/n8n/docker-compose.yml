# =============================================================================
# Copy this file to your n8n project as docker-compose.yml (e.g. ~/n8n/n8n/).
# Then: docker compose down && docker compose up -d
#
# /files/input and /files/output exist ONLY inside the container. They map to
# your real folders: <repo>/video-automation/input and .../output on the host.
# There is no literal "files" directory you create on the host.
#
# If n8n says a path under /files/input is "not writable":
#   - Ensure the host folders exist. On Docker Desktop, file sharing must include them.
#   - Relax permissions on the host, e.g. chmod 775 on input/ and output/
#     (the container runs as user "node", typically UID 1000).
#
# Optional: in the same directory as this compose file, add a .env with:
#   MK04_ROOT=/path/to/VAmk0.4/video-automation
#   # Legacy alias still honored if MK04_ROOT is unset:
#   # MK03_ROOT=/path/to/old/checkout
#   N8N_HOME=/var/lib/n8n
#   WEBHOOK_URL=https://your-ngrok-url/...
#
# Linux deployments must use real Linux host paths on the left side of volume
# mounts. Older /Users/... paths are macOS developer examples only.
# =============================================================================

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Set your public webhook base URL here or duplicate as WEBHOOK_URL in .env
      - WEBHOOK_URL=https://yadiel-foundationary-distinctly.ngrok-free.dev
      - N8N_SECURE_COOKIE=false
    # Lets workflows reach services on the host (e.g. Flask on :5050). Needed on Docker Engine Linux; harmless on Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${N8N_HOME:-/var/lib/n8n}:/home/node/.n8n:rw
      # Host paths (left) — prefer MK04_ROOT in .env; MK03_ROOT is legacy fallback (no trailing slash)
      - ${MK04_ROOT:-${MK03_ROOT:-/path/to/VAmk0.4/video-automation}}/input:/files/input:rw
      - ${MK04_ROOT:-${MK03_ROOT:-/path/to/VAmk0.4/video-automation}}/output:/files/output:rw
    restart: unless-stopped
